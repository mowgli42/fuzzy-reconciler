version: '3.8'
services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
    command: uvicorn src.fuzzy_reconciler.api.app:app --host 0.0.0.0 --port 8000 --reload
