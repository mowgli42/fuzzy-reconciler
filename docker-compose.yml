version: '3.8'
services:
  backend:
    build: .
    ports:
      - "8010:8010"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
    command: uvicorn fuzzy_reconciler.api.app:app --host 0.0.0.0 --port 8010 --reload
  frontend:
    image: node:22-bookworm
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend
